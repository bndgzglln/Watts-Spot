name: SpotPrices
options:
  bundleIdPrefix: com.modeleven
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.4"
  developmentRegion: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    DEVELOPMENT_TEAM: 7GV43AH2C4
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"

targets:
  SpotPriceKit:
    type: framework
    platform: iOS
    sources:
      - path: Shared
        buildPhase: sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.modeleven.SpotPriceKit
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
        DEFINES_MODULE: YES
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundlePackageType: FMWK
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2024. All rights reserved."
        INSTALL_PATH: "$(LOCAL_LIBRARY_DIR)/Frameworks"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
          - "@executable_path/EmbeddedFrameworks"
        BUILD_LIBRARY_FOR_DISTRIBUTION: NO

  Watts Spot:
    type: application
    platform: iOS
    sources:
      - path: Watts Spot
        excludes:
          - "widget/**"
          - "icon.icon/**"
    resources:
      - path: Watts Spot/Translations-*.json
    settings:
      base:
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIBackgroundModes: "fetch"
        PRODUCT_BUNDLE_IDENTIFIER: com.modeleven.Watts-Spot
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        LOCALIZATION_PREFERS_STRING_CATALOGS: YES
        STRING_CATALOG_GENERATE_SYMBOLS: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Watts Spot"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES
        CLANG_ENABLE_MODULES: YES
        CLANG_ENABLE_OBJC_ARC: YES
        CLANG_ENABLE_OBJC_WEAK: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        VALIDATE_PRODUCT: YES
    dependencies:
      - target: SpotPriceKit
        embed: true
      - target: PriceWidgetExtension
        embed: true
        codeSign: true
        buildPhase:
          copyFiles:
            destination: plugins

  PriceWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: PriceWidget
    resources:
      - path: PriceWidget/Translations-*.json
    settings:
      base:
        INFOPLIST_FILE: PriceWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.modeleven.Watts-Spot.PriceWidgetExtension
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
        TARGETED_DEVICE_FAMILY: "1"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
          - "@executable_path/../../Frameworks"
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: SpotPriceKit
        embed: false

schemes:
  Watts Spot:
    build:
      targets:
        "Watts Spot": all
        SpotPriceKit: all
        PriceWidgetExtension: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
